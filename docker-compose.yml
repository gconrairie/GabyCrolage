# Nginx Proxy Manager : proxy HTTP vers le conteneur (TLS uniquement côté NPM, port 443 du VPS).
#   Forward Hostname : gabycrolage-web
#   Forward Port     : 8080
#   Scheme           : http  (pas https vers le backend)
#
# Docker Compose charge le fichier .env à la racine pour interpoler ${VITE_MEDIA_KIT_SECRET} au build.

services:
  web:
    build:
      context: .
      args:
        VITE_MEDIA_KIT_SECRET: ${VITE_MEDIA_KIT_SECRET:-}
    container_name: gabycrolage-web
    env_file: .env
    environment:
      PORT: "8080"
    networks:
      - npm_graab
    # Pas de `ports:` : accès via le réseau Docker (NPM).
    # Décommenter seulement pour debug local sur la machine hôte :
    # ports:
    #   - "127.0.0.1:8080:8080"
    restart: unless-stopped

networks:
  npm_graab:
    external: true
    name: npm-graab
